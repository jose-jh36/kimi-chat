<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <title>Kimi Chat Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root { --primary: #667eea; --primary-dark: #764ba2; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }
        
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background: #f0f2f5;
        }
        
        .app-container.dark { background: #1a1a2e; }
        
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .header h1 { font-size: 18px; font-weight: 700; }
        
        .icon-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .auth-section {
            background: linear-gradient(135deg, #ffd93d 0%, #ff6b6b 100%);
            color: #333;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .auth-section.authed {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .auth-text { font-size: 14px; font-weight: 600; flex: 1; }
        
        .auth-btn {
            background: #333;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
        
        .model-bar {
            background: white;
            padding: 10px 12px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        
        .dark .model-bar { background: #16213e; border-color: #333; }
        
        .model-select {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            background: white;
        }
        
        .dark .model-select { background: #0f3460; border-color: #333; color: white; }
        
        .clear-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #f0f2f5;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }
        
        .dark .chat-container { background: #1a1a2e; }
        
        .message {
            margin-bottom: 12px;
            max-width: 90%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        
        .bot-message {
            background: white;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .dark .bot-message { background: #16213e; color: #eee; }
        
        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 16px 20px;
            background: white;
            border-radius: 18px;
            width: fit-content;
            margin-bottom: 12px;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite both;
        }
        
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        .input-area {
            background: white;
            padding: 12px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        
        .dark .input-area { background: #16213e; border-color: #333; }
        
        #userInput {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            resize: none;
            font-family: inherit;
            max-height: 120px;
            min-height: 50px;
        }
        
        .dark #userInput { background: #0f3460; border-color: #333; color: white; }
        
        #sendBtn {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            height: fit-content;
            min-height: 50px;
        }
        
        #sendBtn:disabled { opacity: 0.5; }
        
        .welcome {
            text-align: center;
            padding: 30px 20px;
            color: #666;
        }
        
        .dark .welcome { color: #aaa; }
        
        .welcome-icon { font-size: 64px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .welcome h2 { font-size: 22px; margin-bottom: 8px; color: #333; }
        .dark .welcome h2 { color: #eee; }
        
        .welcome p { font-size: 14px; margin-bottom: 24px; }
        
        .quick-actions { display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto; }
        
        .quick-btn {
            background: white;
            border: 2px solid #e0e0e0;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            color: #333;
            font-weight: 500;
        }
        
        .dark .quick-btn { background: #16213e; border-color: #333; color: #eee; }
        
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 1000;
        }
        
        .loading.active { display: flex; }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .loading-text { color: white; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Cargando...</div>
    </div>

    <div class="app-container" id="app">
        <div class="header">
            <h1>🚀 Kimi Chat Pro</h1>
            <button class="icon-btn" id="themeBtn">🌙</button>
        </div>
        
        <div class="auth-section" id="authSection">
            <div class="auth-text" id="authText">🔐 Conecta tu cuenta</div>
            <button class="auth-btn" id="authBtn">Iniciar sesión</button>
        </div>
        
        <div class="model-bar">
            <select class="model-select" id="modelSelect">
                <option value="moonshotai/kimi-k2.5">⚡ Kimi K2.5</option>
                <option value="moonshotai/kimi-k2-thinking">🧠 Kimi Thinking</option>
                <option value="openai/gpt-4o-mini">🤖 GPT-4o Mini</option>
                <option value="anthropic/claude-3-haiku">🎭 Claude 3</option>
            </select>
            <button class="clear-btn" id="clearBtn">🗑️</button>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">🤖</div>
                <h2>¡Bienvenido a Kimi Chat Pro!</h2>
                <p>Tu asistente de IA avanzado. Todo 100% gratis.</p>
                <div class="quick-actions">
                    <button class="quick-btn" data-text="Explica conceptos complejos de forma simple">📚 Explicar conceptos</button>
                    <button class="quick-btn" data-text="Ayúdame a escribir un email profesional">✉️ Escribir email</button>
                    <button class="quick-btn" data-text="Genera ideas creativas">💡 Generar ideas</button>
                    <button class="quick-btn" data-text="Revisa mi código">💻 Revisar código</button>
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <textarea id="userInput" rows="1" placeholder="Escribe..." disabled></textarea>
            <button id="sendBtn" disabled>Enviar</button>
        </div>
    </div>

    <script src="https://js.puter.com/v2/"></script>
    <script>
        const app = document.getElementById('app');
        const loading = document.getElementById('loading');
        const authSection = document.getElementById('authSection');
        const authText = document.getElementById('authText');
        const authBtn = document.getElementById('authBtn');
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const themeBtn = document.getElementById('themeBtn');
        const modelSelect = document.getElementById('modelSelect');
        const clearBtn = document.getElementById('clearBtn');
        const welcome = document.getElementById('welcome');
        
        let isProcessing = false;
        let isAuthed = false;
        let currentUser = null;
        let chatHistory = JSON.parse(localStorage.getItem('kimiHistory')) || [];
        
        // Theme
        const isDark = localStorage.getItem('kimiDark') === 'true';
        if (isDark) {
            app.classList.add('dark');
            themeBtn.textContent = '☀️';
        }
        
        themeBtn.addEventListener('click', () => {
            const dark = app.classList.toggle('dark');
            themeBtn.textContent = dark ? '☀️' : '🌙';
            localStorage.setItem('kimiDark', dark);
        });
        
        // Events
        authBtn.addEventListener('click', handleAuth);
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        sendBtn.addEventListener('click', sendMessage);
        clearBtn.addEventListener('click', clearChat);
        
        document.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (!isAuthed) { alert('Primero conecta tu cuenta'); return; }
                userInput.value = btn.getAttribute('data-text');
                userInput.focus();
            });
        });
        
        // Auth
        async function checkAuth() {
            showLoading('Verificando...');
            try {
                if (puter.auth.isSignedIn()) {
                    currentUser = await puter.auth.getUser();
                    setAuth(true);
                } else {
                    setAuth(false);
                }
            } catch (err) {
                setAuth(false);
            } finally {
                hideLoading();
            }
        }
        
        async function handleAuth() {
            if (isAuthed) {
                showLoading('Cerrando...');
                await puter.auth.signOut();
                setAuth(false);
                resetChat();
                hideLoading();
            } else {
                showLoading('Abriendo...');
                try {
                    await puter.auth.signIn();
                    await checkAuth();
                } catch (err) {
                    alert('Para iniciar sesión:\n1. Ve a puter.com en Chrome\n2. Inicia sesión allí\n3. Vuelve aquí y recarga');
                } finally {
                    hideLoading();
                }
            }
        }
        
        function setAuth(authed) {
            isAuthed = authed;
            if (authed && currentUser) {
                authSection.classList.add('authed');
                authText.textContent = `👤 ${currentUser.username || 'Usuario'}`;
                authBtn.textContent = 'Salir';
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.placeholder = 'Escribe tu mensaje...';
                loadHistory();
            } else {
                authSection.classList.remove('authed');
                authText.textContent = '🔐 Conecta tu cuenta';
                authBtn.textContent = 'Iniciar sesión';
                userInput.disabled = true;
                sendBtn.disabled = true;
                userInput.placeholder = 'Conecta tu cuenta...';
            }
        }
        
        // Chat
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isProcessing || !isAuthed) return;
            
            addMessage(text, true);
            saveHistory('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';
            
            isProcessing = true;
            sendBtn.disabled = true;
            sendBtn.textContent = '...';
            showTyping();
            
            try {
                const response = await puter.ai.chat(text, {
                    model: modelSelect.value,
                    stream: true
                });
                
                removeTyping();
                let fullText = '';
                const botDiv = addMessage('', false);
                const contentDiv = botDiv.querySelector('div:first-child');
                
                for await (const part of response) {
                    if (part?.text) {
                        fullText += part.text;
                        contentDiv.textContent = fullText;
                        chatContainer.scrollTop = 999999;
                    }
                }
                
                saveHistory('assistant', fullText);
                
            } catch (err) {
                removeTyping();
                addMessage('❌ Error: ' + err.message, false, true);
            }
            
            isProcessing = false;
            sendBtn.disabled = false;
            sendBtn.textContent = 'Enviar';
            userInput.focus();
        }
        
        function addMessage(text, isUser, isError) {
            if (welcome && welcome.parentNode) welcome.remove();
            
            const div = document.createElement('div');
            div.className = 'message ' + (isUser ? 'user-message' : 'bot-message');
            if (isError) div.style.background = '#ffebee';
            
            const time = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
            
            div.innerHTML = `<div>${text.replace(/</g, '&lt;')}</div><div class="message-time">${time}</div>`;
            
            chatContainer.appendChild(div);
            chatContainer.scrollTop = 999999;
            return div;
        }
        
        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing-indicator';
            div.id = 'typing';
            div.innerHTML = '<span></span><span></span><span></span>';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = 999999;
        }
        
        function removeTyping() {
            document.getElementById('typing')?.remove();
        }
        
        function saveHistory(role, content) {
            chatHistory.push({
                role: role,
                content: content,
                time: new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'}),
                timestamp: Date.now()
            });
            localStorage.setItem('kimiHistory', JSON.stringify(chatHistory));
        }
        
        function loadHistory() {
            if (chatHistory.length === 0) return;
            welcome?.remove();
            chatHistory.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message ' + (msg.role === 'user' ? 'user-message' : 'bot-message');
                div.innerHTML = `<div>${msg.content.replace(/</g, '&lt;')}</div><div class="message-time">${msg.time}</div>`;
                chatContainer.appendChild(div);
            });
            chatContainer.scrollTop = 999999;
        }
        
        function clearChat() {
            if (!confirm('¿Borrar todo?')) return;
            chatHistory = [];
            localStorage.removeItem('kimiHistory');
            chatContainer.innerHTML = `
                <div class="welcome">
                    <div class="welcome-icon">🤖</div>
                    <h2>¡Chat limpio!</h2>
                    <p>Empieza de nuevo</p>
                </div>
            `;
        }
        
        function resetChat() {
            chatContainer.innerHTML = `
                <div class="welcome" id="welcome">
                    <div class="welcome-icon">🤖</div>
                    <h2>¡Bienvenido!</h2>
                    <p>Conecta tu cuenta para comenzar</p>
                    <div class="quick-actions">
                        <button class="quick-btn" data-text="Explica conceptos">📚 Explicar</button>
                        <button class="quick-btn" data-text="Escribe email">✉️ Email</button>
                        <button class="quick-btn" data-text="Genera ideas">💡 Ideas</button>
                        <button class="quick-btn" data-text="Revisa código">💻 Código</button>
                    </div>
                </div>
            `;
            document.querySelectorAll('.quick-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (!isAuthed) { alert('Conecta tu cuenta'); return; }
                    userInput.value = btn.getAttribute('data-text');
                });
            });
        }
        
        function showLoading(text) {
            loading.querySelector('.loading-text').textContent = text;
            loading.classList.add('active');
        }
        
        function hideLoading() {
            loading.classList.remove('active');
        }
        
        // Init
        checkAuth();
    </script>
</body>
</html>
